<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNETIFASTER WI-FI PACKAGE</title>
    <link rel="stylesheet" href="mneti.css">
</head>
<body>
    <header>
<h1>Mnetifaster wi-fi packages</h1>
<p>Select your internet package</p>

    </header>

    <div class="container">
        <div class="card">
            <h1>Daily Plan</h1>
            <p class="price">KES 50</p>
            <p>1 day unlimited plan</p>
            <button onclick="buypackage('daily plan,50')">buy now</button>



        </div>

        <div class="card">
            <h1>weekly Plan</h1>
            <p class="price">KES 250</p>
            <p>7 days unlimited plan</p>
            <button onclick="buypackage('weekly plan,50')">buy now</button>



        </div>

        <div class="card">
            <h1>Monthly Plan</h1>
            <p class="price">KES 1000</p>
            <p>30 days unlimited plan</p>
            <button onclick="buypackage('monthly plan,50')">buy now</button>



        </div>


    </div>
    <div id="result"></div>
    <script src="mneti.js"></script>
    
</body>
</html>
